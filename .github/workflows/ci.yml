name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run compile

  server-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: services/personal-helper-server
      - run: npx tsc --noEmit
        working-directory: services/personal-helper-server

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run compile
      - run: npx vsce package -o personal-vscode-helper.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "personal-vscode-helper.vsix"

  publish:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run compile
      - run: npx vsce publish -p ${{ secrets.VSCE_PAT }}
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

  server-publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/server-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        working-directory: services/personal-helper-server
      - run: npm publish
        working-directory: services/personal-helper-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
